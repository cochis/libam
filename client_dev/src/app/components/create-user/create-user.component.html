
<logo></logo>
<section id="feature" class="section-padding">
    <div class="container">
      <div class="row">
        <div class="header-section text-center title">
          <h2>{{titulo}}</h2>
             <div class="message success" *ngIf ="status == 'success'">
                La propiedad de conocenos se ha creado correctamente, puedes  <a href="#">verlo   aqui</a>
             </div>
             <div class="message failed" *ngIf ="status == 'failed'">
                No se ha podido guardar la propiedad de conocenos
             </div>


             <div class="errorF">
               <span class ="form_error"  *ngIf = "title.touched && !title.valid">
                  El Titulo es obligatorio
               </span>
               <span class ="form_error"  *ngIf = "description.touched && !description.valid">
                  La descripción es obligatoria
               </span>
             </div>

          <form #knowsForm="ngForm"   (ngSubmit)="onSubmit(knowsForm)">
          <div class="col-md-6 col-sm-6 col-xs-12 left">
            
            <div class="form-group">
              <label for="title">TITULO</label><input type="text" class="form-control" name="title" #title ="ngModel" [(ngModel)]= "knows.title" placeholder="Titulo de Conocenos" required  />
            </div>
            
            <div class="form-group">

        <label for="description">DESCRIPCION</label> <br>
        <textarea id="" cols="40" rows="10"  name="description" #description ="ngModel" [(ngModel)]= "knows.description" placeholder="Ingresa la descripcion" required></textarea>
       

              
            </div>
          </div>
      <div class="col-xs-12">
            <!-- Button -->
            <button type="submit" id="submit" name="submit" class="form contact-form-button light-form-button oswald light"  [disabled]="!projectForm.form.valid">Entrar</button>
          </div>
        </form>
