<logo></logo>

<section id="contact" class="section-padding">
    <div class="container">
      <div class="row">
        <div class="header-section text-center title">
          <h2>{{titulo}}</h2>
          <p>Envíenos sus preguntas, comentarios o propuestas .
            Nota: Los campos con (*) son Obligatorios</p>
          <hr class="bottom-line">
        </div>
        <div class="message success" *ngIf ="status == 'success'">
            Se ha enviado correctamente su mensaje nos comunicaremos con usted a la brevedad.
        </div>
        <div class="message failed" *ngIf ="status == 'failed'">
            No se ha podido enviar el mensaje
        </div>


     
            
        <form #contactForm="ngForm"   (ngSubmit)="onSubmit(contactForm)" class="contactForm title">
          <div class="col-md-12 col-sm-12 col-xs-12 left">
            <div class="form-group">
              <input  type="text" class="form-control" name="name" #name ="ngModel" [(ngModel)]= "contact.name" placeholder="Nombre" required />
              <div class="validation"></div>
            </div>

            <div class="form-group">
              <input type="text" class="form-control" name="email" #email ="ngModel" [(ngModel)]= "contact.email" placeholder="Correo electronico" required data-msg="Por favor envíenos su mail"  />
              <div class="validation"></div>
            </div>

            <div class="form-group">
              <input type="text" class="form-control" name="subjetc" #subjetc ="ngModel" [(ngModel)]= "contact.subjetc" data-msg="Porfavor ingrese el tema a tratar"  placeholder="Tema" required />
              <div class="validation"></div>
            </div>
          </div>


          <div class="col-md-12 col-sm-12 col-xs-12 right">
            <div class="form-group">
              <textarea class="form-control" name="message" #message ="ngModel" [(ngModel)]= "contact.message" data-rule="required" data-msg="Por favor describa su tema" placeholder="Mensaje" ></textarea>
              <div class="validation"></div>
            </div>
          </div>

 
          <div class="col-xs-12">
            <!-- Button -->
            <button type="submit" id="submit" name="submit" class="form contact-form-button light-form-button oswald light" [disabled]="!contactForm.form.valid">CONTACTAR</button>
          </div>
        </form>

     

        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3762.886125526633!2d-99.02121868554246!3d19.4173255462015!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85d1fcb66d42c053%3A0xbd786756eab53699!2sColegio+Libertadores+de+Am%C3%A9rica!5e0!3m2!1ses-419!2smx!4v1532222141088" width="600" height="450" frameborder="0" style="border:0" allowfullscreen></iframe>

      </div>

    </div>

  </section>
