<logo></logo>
<div class="contenedorForm">
  <h2>{{titulo}}</h2>

  <div class="message success" *ngIf="status == 'success'">
     Te has identificado correctamente 
  </div>
  <div class="message failed" *ngIf="status == 'failed'">
      No se has podido identificar
  </div>
  <form #loginForm="ngForm"  (ngSubmit)= "onSubmit(onSubmit(loginForm))" >
    
    <p>
      <label for="email">Correo electronico</label>
      <input type="email" name="email" #email="ngModel" [(ngModel)]="user.email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,3}$" required>
      <br>
      <span class="form_error"  *ngIf="email.touched && !email.valid">
        El Correo electronico no es valido
      </span>
    </p>
    <p>
      <label for="password">Contraseña</label>
      <input type="password" name="password" #password="ngModel" [(ngModel)]="user.password" required>
      <br>
      <span class="form_error"  *ngIf="password.touched && !password.valid">
        La contraseña es obligatoria 
      </span>
    </p>
    
    


    
    <input type="submit" value="Ingresar" [disabled]="!loginForm.form.valid">
  </form> 




</div>
